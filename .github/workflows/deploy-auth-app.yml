name: Deploy Auth App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Auth App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: https://npm.pkg.github.com
          scope: '@idalovkh'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Guard against local/legacy UI deps
        run: |
          if grep -E -n "file:\.\./taqseet-ui|@taqseet-ui/" package-lock.json package.json; then
            echo "Found forbidden local or legacy taqseet-ui dependencies"
            exit 1
          fi

      - name: Build application
        env:
          VITE_AUTH_API_URL: ${{ secrets.PROD_AUTH_API_URL || 'https://auth-api.taqseet.ru/api/v1' }}
          VITE_OIDC_ISSUER: ${{ secrets.PROD_OIDC_ISSUER || 'https://auth-api.taqseet.ru' }}
          VITE_MANAGER_APP_URL: ${{ secrets.PROD_MANAGER_APP_URL || 'https://manager.taqseet.ru' }}
          VITE_ADMIN_APP_URL: ${{ secrets.PROD_ADMIN_APP_URL || 'https://admin.taqseet.ru' }}
          VITE_INVEST_APP_URL: ${{ secrets.PROD_INVEST_APP_URL || 'https://invest.taqseet.ru' }}
          VITE_CLIENT_APP_URL: ${{ secrets.PROD_CLIENT_APP_URL || 'https://client.taqseet.ru' }}
          VITE_PARTNER_APP_URL: ${{ secrets.PROD_PARTNER_APP_URL || 'https://partner.taqseet.ru' }}
          VITE_APP_ENV: production
          VITE_RECAPTCHA_SITE_KEY: ${{ secrets.PROD_VITE_RECAPTCHA_SITE_KEY || secrets.VITE_RECAPTCHA_SITE_KEY || '' }}
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: auth-app-dist
          path: dist
          retention-days: 1

  deploy:
    name: Deploy to Production Server
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://auth.taqseet.ru

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: auth-app-dist
          path: ./dist

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.PROD_SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy with rsync
        env:
          DEPLOY_PATH: ${{ secrets.PROD_AUTH_APP_PATH || '/var/www/auth' }}
        run: |
          rsync -avz --delete --progress \
            -e "ssh -i ~/.ssh/id_rsa" \
            ./dist/ \
            ${{ secrets.PROD_SERVER_USER }}@${{ secrets.PROD_SERVER_HOST }}:${DEPLOY_PATH}/

      - name: Fix permissions
        env:
          DEPLOY_PATH: ${{ secrets.PROD_AUTH_APP_PATH || '/var/www/auth' }}
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.PROD_SERVER_USER }}@${{ secrets.PROD_SERVER_HOST }} \
            "sudo chown -R www-data:www-data ${DEPLOY_PATH} && \
             sudo chmod -R 755 ${DEPLOY_PATH}"

      - name: Verify deployment
        env:
          DEPLOY_PATH: ${{ secrets.PROD_AUTH_APP_PATH || '/var/www/auth' }}
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.PROD_SERVER_USER }}@${{ secrets.PROD_SERVER_HOST }} \
            "test -f ${DEPLOY_PATH}/index.html && echo '✅ Auth app deployed successfully'"

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/id_rsa

  notify:
    name: Send Notification
    needs: [build, deploy]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Send success notification
        if: needs.deploy.result == 'success'
        run: |
          echo "✅ Auth App deployment successful!"
          echo "Commit: ${{ github.sha }}"
          echo "URL: https://auth.taqseet.ru"

      - name: Send failure notification
        if: needs.deploy.result == 'failure'
        run: |
          echo "❌ Auth App deployment failed!"
          echo "Commit: ${{ github.sha }}"
